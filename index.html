<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resuscitation Team Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Resuscitation Team Management</h1>
    
    <h2>Resuscitation Team Members</h2>
    <div id="resuscitaion-team-members">
      <label>Team Leader:</label>
      <select id="team-leader"></select>
      <br>
      <label>CPR-1:</label>
      <select id="cpr-1"></select>
      <br>
      <label>CPR-2:</label>
      <select id="cpr-2"></select>
      <br>
      <label>Airway:</label>
      <select id="airway"></select>
      <br>
      <label>Vascular access &amp; medications:</label>
      <select id="vascular"></select>
      <br>
      <label>Scriber:</label>
      <select id="scriber"></select>
      <br>
    </div>
    
<h2>On-Call Subspecialties</h2>
    <div id="specialties">
      <label>Medical Consultant:</label>
      <select id="medical-consultant"></select>
      <br>
      <label>Medical Registrar (Male):</label>
      <select id="medical-registrar-(male)"></select>
      <br>
      <label>Medical Registrar (Female):</label>
      <select id="medical-registrar-(female)"></select>
      <br>
      <label>Surgery:</label>
      <select id="surgery"></select>
      <br>
      <label>Pediatrics:</label>
      <select id="pediatrics"></select>
      <br>
      <label>Cardiology:</label>
      <select id="cardiology"></select>
      <br>
    </div>
    
<h2>Nurses Role Allocation</h2>
    <div id="nurses-roles">
      <label>N1 nurse:</label>
      <select id="n1-nurse"></select>
      <br>
      <label>N2 nurse:</label>
      <select id="n2-nurse"></select>
      <br>
      <label>N3 nurse:</label>
      <select id="n3-nurse"></select>
      <br>
      <label>N4 nurse:</label>
      <select id="n4-nurse"></select>
      <br>
      <label>N5 nurse:</label>
      <select id="n5-nurse"></select>
      <br>
      <label>N6 nurse:</label>
      <select id="n6-nurse"></select>
      <br>
      <label>N7 nurse:</label>
      <select id="n7-nurse"></select>
      <br>
      <label>Admission:</label>
      <select id="admission"></select>
      <br>
    </div>
    
    <h2>Others</h2>
    <div id="additional-roles">
      <label>CT Radiographer:</label>
      <select id="ct-radiographer"></select>
      <br>
      <label>Inside HCA:</label>
      <select id="inside-hca"></select>
      <br>
    </div>
    
    <br>
    <button id="save-button">View Summary</button>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
